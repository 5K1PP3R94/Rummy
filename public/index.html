<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Zwettl Rummy</title>
<link rel="stylesheet" href="style.css?v=3" />
</head>
<body>
  <div id="lobby" class="screen">
    <div class="lobby-box">
      <div class="lobby-cardart">
        <div class="mini-card back"></div>
        <div class="mini-card face">A<span>♥</span></div>
      </div>
      <h1>Zwettl Rummy</h1>
      <p class="subtitle">Österreichische Variante · 4 Spieler · gegen 3 KI-Gegner</p>
      <label for="nameInput">Dein Name</label>
      <input id="nameInput" type="text" placeholder="Raphael" maxlength="20" />
      <label for="difficultySelect">Schwierigkeitsgrad KI</label>
      <select id="difficultySelect">
        <option value="easy">Leicht</option>
        <option value="medium" selected>Mittel</option>
        <option value="hard">Schwer</option>
      </select>
      <button id="startBtn">Spiel starten</button>
    </div>
  </div>

  <div id="game" class="screen hidden">
    <div id="toast"></div>

    <!-- Zusammenfassungs-Modal -->
    <div id="summaryModal" class="modal-overlay hidden">
      <div class="modal-box">
        <h2 id="summaryTitle">Hand beendet</h2>
        <div id="summaryBody"></div>
        <div class="modal-actions">
          <button id="nextHandBtn">Nächste Hand ▶</button>
          <button id="closeSummaryBtn" class="hidden">Schließen</button>
        </div>
      </div>
    </div>

    <div class="topbar">
      <div id="scoreboard"></div>
      <div class="hand-info">Hand <span id="handNumber">1</span>/<span id="handsPerRound">5</span></div>
    </div>

    <div class="opponents" id="opponents"></div>
    <div class="table-area" id="tableArea"></div>

    <div class="center-piles">
      <div class="pile" id="stockPile" title="Vom verdeckten Stapel ziehen">
        <div class="card back" id="stockCard"></div>
        <span class="pile-label"><span id="stockCount">0</span> Karten</span>
      </div>
      <div class="pile" id="discardPile" title="Von Ablage nehmen · Karte wählen + hier klicken zum Ablegen">
        <div class="card-slot" id="discardCard"></div>
        <span class="pile-label">Ablage</span>
      </div>
    </div>

    <div class="turn-banner" id="turnBanner"></div>

    <div class="hand-area">
      <div class="hand" id="handCards"></div>
    </div>

    <div class="action-bar">
      <button id="meldBtn">Auslegen (3+ wählen)</button>
      <button id="jokerBtn">Jolly tauschen</button>
    </div>

    <div id="modeHint" class="mode-hint"></div>
    <div id="log" class="log"></div>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script src="cards.js?v=3"></script>
  <script src="app.js?v=3"></script>
</body>
</html>
